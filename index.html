<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>🏀 Mid-Range Timing Shot</title>
  <style>
    body{margin:0;background:#0b0f18;color:#fff;font-family:Arial;text-align:center}
    h1{margin:18px 0 6px}
    .hud{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
    .chip{background:#111827;border:1px solid #ffffff1a;border-radius:999px;padding:8px 12px;min-width:140px}
    canvas{display:block;margin:10px auto;border-radius:18px;background:#111827;box-shadow:0 20px 50px rgba(0,0,0,.6);max-width:96vw;height:auto}
    .tip{opacity:.75;font-size:14px;margin:6px 0 10px}
    .controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:10px 12px 18px}
    .btn{padding:12px 16px;border-radius:14px;border:0;font-weight:900;cursor:pointer;background:#1f2937;color:#fff;min-width:95px}
    .btn.shoot{background:#f59e0b;color:#0b1020}
    .btn.reset{background:#93c5fd;color:#0b1020}
  </style>
</head>
<body>
  <h1>🏀 Mid-Range Timing Shot</h1>
  <div class="hud">
    <div class="chip">Score: <b id="score">0</b></div>
    <div class="chip">Streak: <b id="streak">0</b></div>
    <div class="chip">Last: <b id="last">-</b></div>
  </div>
  <div class="tip">Move: A/D or ←/→ • Hold Space (or hold Shoot) then RELEASE in GREEN</div>

  <canvas id="cv" width="820" height="480"></canvas>

  <div class="controls">
    <button class="btn" id="leftBtn">⬅ Left</button>
    <button class="btn shoot" id="shootBtn">⏱ Hold Shoot</button>
    <button class="btn" id="rightBtn">Right ➡</button>
    <button class="btn reset" onclick="resetGame()">Reset</button>
  </div>

<script>
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");

const scoreEl = document.getElementById("score");
const streakEl = document.getElementById("streak");
const lastEl = document.getElementById("last");

let score = 0, streak = 0;

const floorY = 360;

// Hoop
const hoop = {
  x: 660, y: 150, rimR: 18,
  boardX: 705, boardY: 80, boardW: 10, boardH: 130
};

// Player
const player = { x: 240, y: 305, r: 20, speed: 5 };
const keys = { left:false, right:false };

// Ball
let ball = null; // {x,y,vx,vy,prevY}
const gravity = 0.38;

// Timing meter
let aiming = false;
let meter = { dir: 1, speed: 0.028, value: 0 };
let shotCooldown = 0;

// Green window (easy & visible)
const greenStart = 0.55;
const greenEnd   = 0.78;

function resetBall(){ ball = null; }
function resetAim(){ aiming = false; meter.value = 0; meter.dir = 1; }

function resetGame(){
  score = 0; streak = 0;
  scoreEl.textContent = score;
  streakEl.textContent = streak;
  lastEl.textContent = "-";
  player.x = 240;
  shotCooldown = 0;
  resetAim();
  resetBall();
}

function drawMeter(){
  const box = { x: 260, y: 22, w: 320, h: 18 };

  ctx.fillStyle="rgba(17,24,39,0.9)";
  ctx.fillRect(box.x, box.y, box.w, box.h);
  ctx.strokeStyle="rgba(255,255,255,0.15)";
  ctx.strokeRect(box.x, box.y, box.w, box.h);

  // green window
  const gx = box.x + box.w * greenStart;
  const gw = box.w * (greenEnd - greenStart);
  ctx.fillStyle="rgba(34,197,94,0.75)";
  ctx.fillRect(gx, box.y, gw, box.h);

  // needle
  const nx = box.x + box.w * meter.value;
  ctx.strokeStyle = aiming ? "rgba(255,176,0,0.95)" : "rgba(255,255,255,0.35)";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(nx, box.y-4);
  ctx.lineTo(nx, box.y + box.h + 4);
  ctx.stroke();

  ctx.fillStyle="rgba(255,255,255,0.85)";
  ctx.font="14px Arial";
  if(shotCooldown > 0) ctx.fillText("Resetting...", 18, 36);
  else ctx.fillText(aiming ? "Release to shoot!" : "Hold to start meter", 18, 36);
}

function drawCourt(){
  ctx.clearRect(0,0,cv.width,cv.height);

  // background
  ctx.fillStyle = "#0b0f18";
  ctx.fillRect(0,0,cv.width,cv.height);

  // floor
  ctx.fillStyle = "#1f2937";
  ctx.fillRect(0,floorY,cv.width,cv.height-floorY);

  // midrange zone marker
  ctx.fillStyle = "rgba(255,255,255,0.07)";
  ctx.fillRect(220, floorY-6, 220, 6);

  // backboard
  ctx.fillStyle = "#e5e7eb";
  ctx.fillRect(hoop.boardX, hoop.boardY, hoop.boardW, hoop.boardH);

  // rim
  ctx.strokeStyle="#f97316";
  ctx.lineWidth=6;
  ctx.beginPath();
  ctx.arc(hoop.x, hoop.y, hoop.rimR, 0, Math.PI*2);
  ctx.stroke();

  // net
  ctx.strokeStyle="rgba(255,255,255,0.25)";
  ctx.lineWidth=2;
  for(let i=-2;i<=2;i++){
    ctx.beginPath();
    ctx.moveTo(hoop.x + i*6, hoop.y + hoop.rimR);
    ctx.lineTo(hoop.x + i*3, hoop.y + hoop.rimR + 36);
    ctx.stroke();
  }

  // player
  ctx.fillStyle="#06b6d4";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
  ctx.fill();

  // ball
  if(!ball){
    ctx.fillStyle="#ffb000";
    ctx.beginPath();
    ctx.arc(player.x+14, player.y-20, 10, 0, Math.PI*2);
    ctx.fill();
  } else {
    ctx.fillStyle="#ffb000";
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, 10, 0, Math.PI*2);
    ctx.fill();
  }

  drawMeter();
}

function makeShot(){
  score += 2;
  streak += 1;
  scoreEl.textContent = score;
  streakEl.textContent = streak;
  lastEl.textContent = "✅ MAKE";
}

function missShot(){
  streak = 0;
  streakEl.textContent = streak;
  lastEl.textContent = "❌ MISS";
}

function update(){
  // movement
  if(keys.left) player.x -= player.speed;
  if(keys.right) player.x += player.speed;
  player.x = Math.max(player.r, Math.min(cv.width-player.r, player.x));

  // cooldown
  if(shotCooldown > 0) shotCooldown--;

  // meter motion
  if(aiming && shotCooldown === 0 && !ball){
    meter.value += meter.speed * meter.dir;
    if(meter.value >= 1){ meter.value = 1; meter.dir = -1; }
    if(meter.value <= 0){ meter.value = 0; meter.dir = 1; }
  }

  // ball physics
  if(ball){
    ball.vy += gravity;
    ball.x += ball.vx;
    ball.y += ball.vy;

    // backboard bounce
    if(ball.x + 10 > hoop.boardX && ball.x - 10 < hoop.boardX + hoop.boardW &&
       ball.y + 10 > hoop.boardY && ball.y - 10 < hoop.boardY + hoop.boardH){
      ball.vx *= -0.7;
      ball.x = hoop.boardX - 11;
    }

    // make detection
    const dx = ball.x - hoop.x;
    const dy = ball.y - hoop.y;
    const dist = Math.hypot(dx, dy);
    const enteringDown = (ball.prevY < hoop.y) && (ball.y >= hoop.y) && ball.vy > 0;

    if(enteringDown && dist < (hoop.rimR - 2)){
      makeShot();
      ball = null;
      shotCooldown = 16;
      resetAim();
      return;
    }

    // miss
    if(ball.y > floorY - 10){
      missShot();
      ball = null;
      shotCooldown = 16;
      resetAim();
      return;
    }

    ball.prevY = ball.y;
  }
}

function shoot(releaseValue){
  if(ball || shotCooldown > 0) return;

  const startX = player.x + 14;
  const startY = player.y - 20;

  const center = (greenStart + greenEnd)/2;
  const green = (releaseValue >= greenStart && releaseValue <= greenEnd);
  const timingError = releaseValue - center;

  // ✅ Consistent arc that reaches rim
  const dx = hoop.x - startX;

  let vx = dx / 42;
  let vy = -10.2;

  if(green){
    // tighter aim
    vx = dx / 40;
    lastEl.textContent = "🟩 GREEN!";
  } else {
    // timing drift left/right (miss control)
    vx += timingError * 14;
    lastEl.textContent = timingError < 0 ? "🟨 EARLY" : "🟨 LATE";
    streak = 0;
    streakEl.textContent = streak;
  }

  ball = { x:startX, y:startY, vx, vy, prevY:startY };
}

function startAim(){
  if(ball || shotCooldown > 0) return;
  aiming = true;
}

function releaseAim(){
  if(!aiming) return;
  aiming = false;
  shoot(meter.value);
  // always reset meter immediately
  meter.value = 0;
  meter.dir = 1;
}

function loop(){
  update();
  drawCourt();
  requestAnimationFrame(loop);
}

// keyboard
document.addEventListener("keydown",(e)=>{
  if(e.code==="ArrowLeft" || e.code==="KeyA") keys.left=true;
  if(e.code==="ArrowRight" || e.code==="KeyD") keys.right=true;
  if(e.code==="Space") startAim();
});
document.addEventListener("keyup",(e)=>{
  if(e.code==="ArrowLeft" || e.code==="KeyA") keys.left=false;
  if(e.code==="ArrowRight" || e.code==="KeyD") keys.right=false;
  if(e.code==="Space") releaseAim();
});

// mobile buttons
const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");
const shootBtn = document.getElementById("shootBtn");

function hold(btn, onDown, onUp){
  btn.addEventListener("pointerdown",(e)=>{e.preventDefault(); onDown();});
  btn.addEventListener("pointerup",(e)=>{e.preventDefault(); onUp();});
  btn.addEventListener("pointerleave",(e)=>{e.preventDefault(); onUp();});
  btn.addEventListener("pointercancel",(e)=>{e.preventDefault(); onUp();});
}
hold(leftBtn, ()=>keys.left=true, ()=>keys.left=false);
hold(rightBtn, ()=>keys.right=true, ()=>keys.right=false);
hold(shootBtn, startAim, releaseAim);

resetGame();
loop();
</script>
</body>
</html>
